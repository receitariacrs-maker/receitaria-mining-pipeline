name: Telegram Poll

on:
  schedule:
    # roda a cada 3 min pra reagir rápido quando 7+ vídeos chegam de uma vez
    # (ver BATCH_TRIGGER em telegram_poll.py); minutos ímpares evitam cair
    # exatamente na hora cheia, onde o GitHub costuma atrasar agendamentos
    - cron: "1-59/3 * * * *"
  workflow_dispatch:

concurrency:
  group: telegram-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Checar mensagens novas no Telegram
        working-directory: scripts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALLOWED_USER_ID: ${{ secrets.TELEGRAM_ALLOWED_USER_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python telegram_poll.py
