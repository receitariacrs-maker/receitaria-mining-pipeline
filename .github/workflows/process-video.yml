name: Process Video

on:
  repository_dispatch:
    types: [new-video]

jobs:
  process:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r ../requirements.txt

      - name: Salvar payload do evento no contexto
        env:
          CLIENT_PAYLOAD_JSON: ${{ toJson(github.event.client_payload) }}
        run: python -c "import json, os, context; context.save(json.loads(os.environ['CLIENT_PAYLOAD_JSON']))"

      - name: Avisar que recebeu
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python telegram_notify.py received

      - name: Baixar vídeo/áudio
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          APIFY_ACTOR_INSTAGRAM: ${{ vars.APIFY_ACTOR_INSTAGRAM }}
        run: python download_video.py

      - name: Transcrever (Groq)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python transcribe.py

      - name: Gerar roteiro (Anthropic)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KB_GIST_ID: ${{ secrets.KB_GIST_ID }}
          KB_GIST_TOKEN: ${{ secrets.KB_GIST_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          VENCEDORES_DATABASE_ID: ${{ secrets.VENCEDORES_DATABASE_ID }}
        run: python generate_script.py

      - name: Inserir no Notion
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python notion_insert.py

      - name: Avisar erro (rede de segurança)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python telegram_notify.py error
